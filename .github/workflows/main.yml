    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  call-function:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "https://zwktxojdbdwmnkqndkfo.supabase.co/functions/v1/bright-handler" \
          -H "Content-Type: application/json"
